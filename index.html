<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Tesseract</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div id="mode-controls">
        <button id="btn-regular" class="mode-btn active">Regular</button>
        <button id="btn-demo" class="mode-btn">Demo</button>
      </div>
      <div id="puzzle-controls">
        <button id="btn-reset-puzzle">Reset Puzzle</button>
        <button id="btn-reset-view">Reset View</button>
        <button id="btn-scramble">Scramble</button>
        <label><input type="checkbox" id="chk-wire"> Wireframe (W)</label>
        <label>Speed:
          <input type="range" id="speed-slider" min="1" max="10" value="5">
        </label>
      </div>
      <div id="demo-controls" class="hidden">
        <button id="btn-demo-play">▶ Play</button>
        <button id="btn-demo-pause">⏸ Pause</button>
        <button id="btn-demo-stop">⏹ Stop</button>
        <button id="btn-demo-prev">⏮ Step</button>
        <button id="btn-demo-next">⏭ Step</button>
        <label>
          <input type="checkbox" id="demo-loop"> Loop
        </label>
      </div>
      <div id="move-counter">Move: <span id="move-index">—</span></div>
    </header>

    <div id="main">
      <canvas id="glcanvas"></canvas>

      <div id="view-controls">
        <div class="view-btn-grid">
          <button data-action="rotate-up">▲</button>
          <button data-action="rotate-left">◀</button>
          <button data-action="rotate-right">▶</button>
          <button data-action="rotate-down">▼</button>
        </div>
        <div class="zoom-btns">
          <button data-action="zoom-in" title="Zoom in">＋</button>
          <button data-action="zoom-out" title="Zoom out">－</button>
        </div>
        <button data-action="reset-view" style="margin-top:4px;width:100%">Reset View</button>
      </div>

      <aside id="cell-panel">
        <div class="panel-scroll">
          <!-- Generated by JS -->
        </div>
      </aside>
    </div>

    <div id="status-bar">
      <span id="status-text">Ready</span>
      <span id="undo-redo">
        <button id="btn-undo" disabled>Undo</button>
        <button id="btn-redo" disabled>Redo</button>
      </span>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
