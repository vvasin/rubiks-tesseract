<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Rubik's Tesseract</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Single GL canvas behind everything; the 9 views render into the tile/stage
         rectangles below. Pointer events (orbit drag + tap-to-centre) land here. -->
    <canvas id="glcanvas"></canvas>

    <!-- 4 cell sub-views on top -->
    <div id="cells-top" class="cell-strip"></div>

    <!-- Main tesseract view, with embedded overlays -->
    <div id="stage">
      <button id="menu-button" aria-label="Menu">≡</button>
      <!-- Classic ("exploded cells") view toggle — opposite corner from the menu. The
           icon is an unfolded cube net (cross of cells); it lights up accent when active. -->
      <button id="classic-button" aria-label="Classic view" aria-pressed="false" title="Classic view">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="9.2" y="9.2" width="5.6" height="5.6" rx="1.2" fill="currentColor" fill-opacity="0.9"/>
          <rect x="9.2" y="1.6" width="5.6" height="5.6" rx="1.2" stroke="currentColor" stroke-width="1.6"/>
          <rect x="9.2" y="16.8" width="5.6" height="5.6" rx="1.2" stroke="currentColor" stroke-width="1.6"/>
          <rect x="1.6" y="9.2" width="5.6" height="5.6" rx="1.2" stroke="currentColor" stroke-width="1.6"/>
          <rect x="16.8" y="9.2" width="5.6" height="5.6" rx="1.2" stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </button>

      <!-- Twist-button groups around the cube, generated by JS:
           bottom = whole-cube rotation; top/left/right = per-axis layer turns. -->
      <div id="turn-top" class="turn-group"></div>
      <div id="turn-left" class="turn-group"></div>
      <div id="turn-right" class="turn-group"></div>
      <div id="turn-bottom" class="turn-group"></div>
    </div>

    <!-- 4 cell sub-views on bottom -->
    <div id="cells-bottom" class="cell-strip"></div>
  </div>

  <!-- Menu overlay (hidden until opened) -->
  <div id="menu-overlay" class="hidden">
    <div id="menu-panel" role="dialog" aria-label="Menu">
      <header class="menu-head">
        <span>Menu</span>
        <button id="menu-close" aria-label="Close">✕</button>
      </header>

      <div class="menu-body">
        <div class="menu-actions">
          <button id="btn-shuffle" class="menu-item">Shuffle</button>
          <button id="btn-reset" class="menu-item danger">Reset puzzle</button>
        </div>

        <section class="menu-section">
          <h3>Settings</h3>
          <label class="setting">
            <span>Animation speed</span>
            <input type="range" id="speed-slider" min="1" max="9" step="1" value="5">
          </label>

          <div class="setting radio-list">
            <span class="legend">Controls</span>
            <div class="opts">
              <label><input type="radio" name="controlset" value="central" checked>
                Cube rotation</label>
              <label><input type="radio" name="controlset" value="sides">
                Layer turns</label>
              <label><input type="radio" name="controlset" value="both">
                Both</label>
              <label><input type="radio" name="controlset" value="none">
                None</label>
            </div>
          </div>

          <div class="setting radio-list">
            <span class="legend">Central cell</span>
            <div class="opts">
              <label><input type="radio" name="centralmode" value="solid" checked>
                Solid</label>
              <label><input type="radio" name="centralmode" value="wire">
                Wireframe</label>
            </div>
          </div>

          <div class="setting radio-list">
            <span class="legend">Side cells</span>
            <div class="opts">
              <label><input type="radio" name="sidemode" value="semi" checked>
                Semitransparent</label>
              <label><input type="radio" name="sidemode" value="solid">
                Solid</label>
              <label><input type="radio" name="sidemode" value="wire">
                Wireframe</label>
              <label><input type="radio" name="sidemode" value="none">
                None</label>
            </div>
          </div>

          <div class="setting radio-list">
            <span class="legend">Display</span>
            <div class="opts">
              <label><input type="checkbox" id="classic-toggle">
                Classic view</label>
              <label><input type="checkbox" id="core-wire-toggle">
                Core tesseract</label>
            </div>
          </div>

          <div class="setting radio-list">
            <span class="legend">Classic view</span>
            <div class="opts">
              <label><input type="checkbox" id="outer-cell-toggle">
                Outer cell</label>
              <label><input type="checkbox" id="group-sides-toggle">
                Group side cells</label>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Reset confirmation -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-panel" role="alertdialog" aria-label="Confirm reset">
      <p>Reset the puzzle to solved? This can't be undone.</p>
      <div class="confirm-actions">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok" class="danger">Reset</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
