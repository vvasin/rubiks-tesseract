<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Rubik's Tesseract</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Single GL canvas behind everything; the 9 views render into the tile/stage
         rectangles below. Pointer events (orbit drag + tap-to-centre) land here. -->
    <canvas id="glcanvas"></canvas>

    <!-- 4 cell sub-views on top -->
    <div id="cells-top" class="cell-strip"></div>

    <!-- Main tesseract view, with embedded overlays -->
    <div id="stage">
      <button id="menu-button" aria-label="Menu">≡</button>

      <!-- Twist-button groups around the cube, generated by JS:
           bottom = whole-cube rotation; top/left/right = per-axis layer turns. -->
      <div id="turn-top" class="turn-group"></div>
      <div id="turn-left" class="turn-group"></div>
      <div id="turn-right" class="turn-group"></div>
      <div id="turn-bottom" class="turn-group"></div>
    </div>

    <!-- 4 cell sub-views on bottom -->
    <div id="cells-bottom" class="cell-strip"></div>
  </div>

  <!-- Menu overlay (hidden until opened) -->
  <div id="menu-overlay" class="hidden">
    <div id="menu-panel" role="dialog" aria-label="Menu">
      <header class="menu-head">
        <span>Menu</span>
        <button id="menu-close" aria-label="Close">✕</button>
      </header>

      <button id="btn-shuffle" class="menu-item">Shuffle</button>
      <button id="btn-reset" class="menu-item">Reset puzzle</button>

      <section class="menu-section">
        <h3>Settings</h3>
        <label class="setting">
          <span>Animation speed</span>
          <input type="range" id="speed-slider" min="1" max="10" value="5">
        </label>
        <div class="setting radio-list">
          <span class="legend">Controls</span>
          <label><input type="radio" name="controlset" value="central" checked>
            Cube rotation</label>
          <label><input type="radio" name="controlset" value="sides">
            Layer turns</label>
          <label><input type="radio" name="controlset" value="both">
            Both</label>
          <label><input type="radio" name="controlset" value="none">
            None</label>
        </div>

        <div class="setting radio-list">
          <span class="legend">Central cell</span>
          <label><input type="radio" name="centralmode" value="solid" checked>
            Solid</label>
          <label><input type="radio" name="centralmode" value="wire">
            Wireframe</label>
        </div>

        <div class="setting radio-list">
          <span class="legend">Side cells</span>
          <label><input type="radio" name="sidemode" value="semi" checked>
            Semitransparent</label>
          <label><input type="radio" name="sidemode" value="wire">
            Wireframe</label>
          <label><input type="radio" name="sidemode" value="none">
            None</label>
        </div>

        <div class="setting radio-list">
          <span class="legend">Core tesseract</span>
          <label><input type="checkbox" id="core-wire-toggle">
            Wireframe</label>
        </div>
      </section>
    </div>
  </div>

  <!-- Reset confirmation -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-panel" role="alertdialog" aria-label="Confirm reset">
      <p>Reset the puzzle to solved? This can't be undone.</p>
      <div class="confirm-actions">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok" class="danger">Reset</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
